<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Login - Smart Study</title>
  <style>
    body { font-family: Arial; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f4f7f6; margin: 0; }
    .login-container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 300px; text-align: center; }
    h2 { color: #2c3e50; margin-bottom: 20px; }
    input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
    .btn-login { width: 100%; padding: 10px; background: #2ecc71; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    .btn-login:hover { background: #27ae60; }
    .btn-signup { margin-top: 15px; display: inline-block; color: #3498db; text-decoration: none; font-size: 14px; }
    .btn-signup:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="login-container">
  <h2>Autentificare</h2>
  <form th:action="@{/login}" method="post">
    <input type="text" name="username" placeholder="Utilizator" required>
    <input type="password" name="password" placeholder="Parolă" required>
    <button type="submit" class="btn-login">Intră în cont</button>
  </form>
  <!-- Am schimbat th:href sa puncteze la /register: -->
  <a th:href="@{/register}" class="btn-signup">Nu ai cont? Înregistrează-te aici</a>
</div>
</body>
</html>
