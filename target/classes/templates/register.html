<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sign Up - Smart Study</title>
    <style>
        body { font-family: Arial; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f4f7f6; margin: 0; }
        .register-container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        h2 { color: #2c3e50; margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        .btn-register { width: 100%; padding: 10px; background: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-register:hover { background: #2980b9; }
        .btn-login { margin-top: 15px; display: inline-block; color: #2ecc71; text-decoration: none; font-size: 14px; }
        .btn-login:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="register-container">
    <h2>Creare Cont</h2>
    <form th:action="@{/api/auth/register}" method="post">
        <input type="text" name="username" placeholder="Nume utilizator" required>
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Parolă" required>
        <button type="submit" class="btn-register">Înregistrează-te</button>
    </form>
    <a th:href="@{/login}" class="btn-login">Ai deja cont? Autentifică-te</a>
</div>
</body>
</html>
